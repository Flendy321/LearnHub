<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub — From Zero to Mastery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --teal: #00E5C3;
        --bg: #050505;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.5);
        --border: rgba(255, 255, 255, 0.1);
        --nav-bg: rgba(13, 15, 16, 0.8);
    }

    body {
        background: var(--bg);
        background-image: radial-gradient(circle at 50% 45%, #0a1211 0%, #050505 70%);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* TOP NAV BAR */
    nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        height: 70px;
        background: var(--nav-bg);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
    }

    .logo-icon {
        width: 30px; height: 30px;
        background: var(--teal);
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
    }

    .logo-text {
        font-family: 'Archivo Black', sans-serif;
        font-size: 16px;
        color: var(--text);
        text-transform: uppercase;
    }

    /* SIDEBAR (Drawer) */
    .sidebar {
        position: fixed;
        top: 0; right: -300px;
        width: 300px;
        height: 100vh;
        background: #0d0f10;
        z-index: 200;
        padding: 80px 40px;
        transition: right 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 30px;
    }

    .sidebar.active { right: 0; }

    .sidebar-link {
        color: var(--text);
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        opacity: 0.7;
        transition: opacity 0.2s;
    }

    .sidebar-link:hover { opacity: 1; color: var(--teal); }

    .sidebar-credits {
        margin-top: auto;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
    }

    /* HAMBURGER MENU ICON */
    .menu-btn {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 201;
    }

    .menu-btn span {
        display: block;
        width: 24px;
        height: 2px;
        background: var(--text);
        transition: 0.3s;
    }

    /* Animation for X icon when open */
    .menu-btn.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* HERO CONTENT */
    .hero {
        position: relative;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 24px;
    }

    .hero-pattern {
        position: absolute;
        inset: 0;
        z-index: 0;
        opacity: 0.1;
        pointer-events: none;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 40px;
        padding: 40px;
        filter: blur(1px);
    }

    .subject-icon { font-size: 32px; animation: float 6s ease-in-out infinite; text-align: center; }

    .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 100px;
        font-size: 11px;
        color: var(--teal);
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .hero h1 {
        font-family: 'Archivo Black', sans-serif;
        font-size: clamp(40px, 8vw, 100px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        margin-bottom: 24px;
    }

    .hero h1 span { color: var(--teal); }

    .btn {
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
    }

    .btn-primary { background: var(--teal); color: #000; }
    .btn-secondary { background: transparent; color: #fff; border: 1px solid var(--border); }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }
</style>
</head>
<body>

<nav>
    <a href="#" class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <span class="logo-text">LearnHub</span>
    </a>

    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div class="sidebar" id="sidebar">
    <a href="#" class="sidebar-link">Dashboard</a>
    <a href="#" class="sidebar-link">My Progress</a>
    <a href="#" class="sidebar-link">Settings</a>
    
    <div class="sidebar-credits">
        <strong>Credits</strong><br>
        Created by Flendy and Mr. Cookie
    </div>
</div>

<section class="hero">
    <div class="hero-pattern">
        <div class="subject-icon">⚛️</div><div class="subject-icon">🎹</div>
        <div class="subject-icon">🧬</div><div class="subject-icon">⛩️</div>
        <div class="subject-icon">🧠</div><div class="subject-icon">🌌</div>
    </div>
    
    <div class="badge">Start your journey</div>
    <h1>Learn <span>Anything,</span><br>From Zero to Mastery</h1>
    <div style="display:flex; gap:15px; margin-top:20px;">
        <a href="#" class="btn btn-primary">Explore Subjects</a>
        <a href="#" class="btn btn-secondary">How it works</a>
    </div>
</section>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');

    menuBtn.addEventListener('click', () => {
        menuBtn.classList.toggle('open');
        sidebar.classList.toggle('active');
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !menuBtn.contains(e.target) && sidebar.classList.contains('active')) {
            menuBtn.classList.remove('open');
            sidebar.classList.remove('active');
        }
    });
</script>

</body>
</html>
